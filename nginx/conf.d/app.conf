upstream backend_servers {
    least_conn; 
    server backend-1:5000 max_fails=3 fail_timeout=30s;
    server backend-2:5000 max_fails=3 fail_timeout=30s;
    server backend-3:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;
    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # 1. Serve Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # CRITICAL FOR REACT ROUTER:
        # This tells NGINX: if you can't find the file the user asked for,
        # just give them index.html and let React handle the path.
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to Node.js instances
    location /api/ {
        proxy_pass http://backend_servers; 
        
        # Passive Health Check "Magic"
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        
        # Headers to ensure Node.js knows the real user's info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}